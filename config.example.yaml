output_dir: "./data/exports"

search:
  sites:
    - saramin
    - jobkorea
    - linkedin
    # Experimental fallback candidates
    # - wanted
    # - jumpit
    # - remember
    # - blind
    # - jobplanet
    # - rocketpunch
  queries: []
  crawl_strategy: "broad_it_scan"
  crawl_terms:
    - "개발"
    - "software engineer"
    - "data engineer"
  listing_page_limit: 0
  max_results_per_site: 8
  request_timeout_seconds: 20
  fetch_details: true
  store_html: false
  detail_refetch_hours: 24
  concurrency: 4
  pause_between_searches_seconds: 1.0
  ai_enrichment_enabled: false
  ai_provider: "heuristic"
  ai_model: ""
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
  browser_enabled: true
  browser_headless: true
  browser_timeout_seconds: 60

criteria:
  roles:
    - "백엔드 개발자"
  keywords:
    - "Python"
  exclude_keywords:
    - "인턴"
    - "계약직"
  locations:
    - "서울"
  companies: []
  experience_levels: []
  education_levels: []
  employment_types: []
  required_terms: []
  extra_terms:
    - "채용"
    - "공고"
  strict_match_groups: []

schedule:
  enabled: false
  timezone: "Asia/Seoul"
  mode: "fixed_times"
  times:
    - "09:00"
    - "18:00"
  interval_hours: 4
  run_on_start: true
  max_runs: null

preprocessing:
  enabled: true
  dedupe_strategy: "normalized_url"
  min_text_chars: 80
  normalize_whitespace: true
  language_hints:
    - "ko"
    - "en"

ai:
  # none | api_key_env | oauth_cli | external_command
  auth_mode: "none"
  api_key_env: "OPENAI_API_KEY"
  oauth_profile: ""
  # Used when search.ai_provider is external_command.
  # The command must read the posting prompt from stdin and print strict JSON.
  external_command: ""
  config: {}

integrations:
  harness_config: {}
  mcp_servers: {}
  skills_config: {}
  messaging_config: {}
  contact_email_enabled: false
  contact_email_from: ""
  contact_default_recipients: []
  contact_message_template: |
    Hello,

    I am interested in {title} at {company}.

    Posting: {url}
